<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5C6B3A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriTrack" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/ico" href="/favicon.ico" />
    <title>NutriTrack</title>
    <script>
      // Unregister all service workers and clear caches on every load
      // This ensures updates are always picked up immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
